name: App Scripts PR Check

on:
  pull_request:
    branches:
      - dev
    paths:
      - ".github/workflows/app_scripts_pr_check.yml"
      - "app/scripts/**"
      - "app/requirements.txt"

jobs:
  app-scripts-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python syntax for app/scripts
        run: |
          python -m py_compile \
            app/scripts/cli/run_pipeline.py \
            app/scripts/cli/mvp_web.py \
            app/scripts/web/app.py \
            app/scripts/grading/grade_submission.py \
            app/scripts/extractors/pdf_extractor.py \
            app/scripts/extractors/pptx_extractor.py \
            app/scripts/extractors/html_extractor.py \
            app/scripts/core/pipeline.py \
            app/scripts/storage/chroma_store.py \
            app/scripts/retrieval/chroma_rag.py
